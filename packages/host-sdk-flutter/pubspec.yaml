name: miniapps_host
description: Flutter SDK for hosting mini-apps. Turns any app into a device host for the miniapps framework.
version: 0.1.0
homepage: https://github.com/miniapps/miniapps

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  socket_io_client: ^3.0.0
  local_auth: ^2.3.0
  geolocator: ^13.0.0
  file_picker: ^8.0.0
  shared_preferences: ^2.3.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
